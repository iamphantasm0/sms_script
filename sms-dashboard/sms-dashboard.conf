# /etc/httpd/conf.d/sms-dashboard.conf
# Deploy this file to the path above on the Rocky Linux server.

<VirtualHost *:8080>
    DocumentRoot /opt/sms-dashboard
    DirectoryIndex index.php

    <Directory /opt/sms-dashboard>
        AllowOverride None
        Require all granted
    </Directory>

    # Block direct HTTP access to raw log files — use logs.php instead.
    <Directory /opt/sms-dashboard/logs>
        Require all denied
    </Directory>

    # Scripts can run for several minutes — don't kill the connection early.
    Timeout 300
</VirtualHost>
